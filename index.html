<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  
  <title>PRO EDGE STRATÉGIE</title>
  <meta name="description" content="Assistant de stratégie golfique haute précision.">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { 
      --accent: #00e676; 
      --bg: #000000; 
      --card: rgba(18, 18, 18, 0.85); 
      --danger: #ff3b30; 
      --text: #ffffff; 
      --border: rgba(255, 255, 255, 0.1); 
    }
    
    html, body { 
      margin: 0 !important; 
      padding: 0 !important; 
      height: 100% !important; 
      width: 100% !important;
      overflow: hidden !important; 
      position: fixed !important;
    }

    body { 
      font-family: 'Urbanist', -apple-system, sans-serif; 
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                  url('https://images.unsplash.com/photo-1535131749006-b7f58c99034b?q=80&w=2070') no-repeat center center fixed;
      background-size: cover;
      color: var(--text); 
      height: 100dvh; 
      width: 100%;
      transition: 0.3s; 
    }

    button:active, .nav-tab:active, .w-btn:active, .save-btn:active {
      transform: scale(0.96);
      filter: brightness(1.2);
    }

    #status-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid var(--accent);
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 800;
      z-index: 10005;
      display: none;
      box-shadow: 0 5px 20px rgba(0, 230, 118, 0.3);
      backdrop-filter: blur(5px);
    }

    body.sun-mode { 
      background: #FFFFFF; 
      --bg: #FFFFFF; --card: #F2F2F2; --text: #000000; --border: #CCCCCC; 
    }

    header { 
      background: rgba(0, 0, 0, 0.6); 
      padding: 15px 5px 10px 5px; 
      text-align: center; 
      border-bottom: 1px solid var(--border); 
      backdrop-filter: blur(10px);
      padding-top: calc(10px + env(safe-area-inset-top));
    }

    .main-logo { font-weight: 900; letter-spacing: 2px; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 5px; color: #ffffff; }
    .main-logo span { color: var(--accent); text-shadow: 0 0 10px rgba(0, 230, 118, 0.4); }
    .main-logo em { font-style: normal; color: #ffffff; font-weight: 300; }
    
    .sub-logo { font-size: 0.6rem; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    
    .nav-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px 5px; padding: 0 5px; }
    .nav-tab { color: #ffffff; font-weight: 800; font-size: 0.55rem; cursor: pointer; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.6; transition: 0.2s; }
    .nav-tab i { font-size: 1.1rem; }
    .nav-tab.active { color: var(--accent); opacity: 1; text-shadow: 0 0 8px rgba(0, 230, 118, 0.3); }

    .page { 
      display: none; 
      height: calc(100dvh - 180px); 
      overflow-y: auto; 
      padding: 15px; 
      box-sizing: border-box; 
      -webkit-overflow-scrolling: touch;
    }
    .page.active { display: block; }
    
    .card { 
      background: var(--card); 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      padding: 15px; 
      margin-bottom: 15px; 
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    label { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; font-weight: 900; margin-bottom: 5px; display: block; letter-spacing: 1px; }

    select, .p-input { 
      background: rgba(0, 0, 0, 0.7) !important; 
      border: 1px solid var(--border); 
      color: #ffffff !important; 
      width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; outline: none; box-sizing: border-box; 
    }

    .dist-input { 
      background: rgba(0,0,0,0.5); 
      border: 1px solid var(--accent); 
      border-radius: 12px; 
      color: #ffffff; font-size: 3.5rem; width: 100%; text-align: center; font-weight: 900; margin-bottom: 10px; 
      box-shadow: inset 0 0 15px rgba(0,230,118,0.1);
    }

    #res-val { 
      font-size: 5rem; font-weight: 900; color: var(--accent); text-align: center; line-height: 1; 
      text-shadow: 0 0 20px rgba(0, 230, 118, 0.6), 0 0 40px rgba(0, 230, 118, 0.2);
    }

    .w-btn { 
      background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: #ffffff; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.7rem; transition: 0.3s;
    }
    .w-btn.active { 
      background: var(--accent) !important; color: black !important; 
      box-shadow: 0 0 15px rgba(0, 230, 118, 0.5); border: none;
    }

    .save-btn { 
      background: var(--accent); color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; 
      box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
    }
    
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; padding: 10px 5px; border-bottom: 1px solid var(--border); text-align: center; }
    td { padding: 12px 5px; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: #ffffff; text-align: center; }

    .user-info { font-size: 10px; color: var(--accent); text-transform: uppercase; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 5px; text-align: center; }
  </style>
</head>
<body>

<div id="status-toast"></div>

<header>
  <div class="main-logo"><span>PRO EDGE</span> <em>STRATÉGIE</em></div>
  <div class="sub-logo"><i class="fa-solid fa-gears"></i> ANALYSE HAUTE PRÉCISION</div>
  <div class="nav-container">
    <div id="tab-caddy" class="nav-tab active" onclick="showPage('caddy')"><i class="fa-solid fa-bolt-lightning"></i>Caddy</div>
    <div id="tab-practice" class="nav-tab" onclick="showPage('practice')"><i class="fa-solid fa-bullseye"></i>Séance</div>
    <div id="tab-config" class="nav-tab" onclick="showPage('config')"><i class="fa-solid fa-map-location-dot"></i>Parcours</div>
    <div id="tab-score" class="nav-tab" onclick="showPage('score')"><i class="fa-solid fa-pen-to-square"></i>Score</div>
    <div id="tab-stats" class="nav-tab" onclick="showPage('stats')"><i class="fa-solid fa-chart-simple"></i>Stats</div>
    <div id="tab-glossary" class="nav-tab" onclick="showPage('glossary')"><i class="fa-solid fa-book-open"></i>Aide</div>
    <div id="tab-reglages" class="nav-tab" onclick="showPage('reglages')"><i class="fa-solid fa-bag-shopping"></i>Sac</div>
    <div class="nav-tab" onclick="toggleSunMode()"><i id="sun-toggle" class="fa-solid fa-sun"></i>Mode</div>
  </div>
  <div id="user-display" class="user-info">Profil: Chargement...</div>
</header>

<div id="page-caddy" class="page active">
  <div class="card">
    <div style="display:flex; justify-content:space-between; font-weight:800; font-size:0.7rem; margin-bottom:10px; letter-spacing:1px;">
      <span id="meteo-ville">📍 POSITION GPS</span>
      <span id="meteo-data" style="color:var(--accent);">--°C | -- KM/H</span>
    </div>
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;">
      <button id="btn-face" class="w-btn active" onclick="setW('face')">FACE</button>
      <button id="btn-dos" class="w-btn" onclick="setW('dos')">DOS</button>
      <button id="btn-gauche" class="w-btn" onclick="setW('gauche')">GAUCHE</button>
      <button id="btn-droite" class="w-btn" onclick="setW('droite')">DROITE</button>
    </div>
  </div>
  <input type="number" id="target" class="dist-input" placeholder="0" oninput="update()">
  <button class="w-btn" id="btn-reset" style="width:100%; margin-bottom:15px; background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1);" onclick="resetCaddy()">RÉINITIALISER</button>
  <select id="club-list" onchange="update()"></select>
  <div class="card" style="text-align:center; border: 1px solid rgba(0, 230, 118, 0.2);">
    <div id="res-club-name" style="font-weight:900; font-size:1.4rem; margin-bottom:5px; color:#fff;">--</div>
    <div id="res-club-usage" style="font-size:0.6rem; color:var(--accent); text-transform:uppercase; letter-spacing:2px; font-weight:700;">--</div>
    <div id="res-val">--</div>
  </div>

  <div class="card" style="border: 1px solid rgba(255,255,255,0.1); margin-top: 10px; padding: 10px;">
    <label style="text-align: center; margin-bottom: 10px;">Mesure de coup</label>
    <div style="display: flex; gap: 8px;">
      <button onclick="fixerDepart()" id="gps-start" class="w-btn" style="flex: 1; border-color: #28a745; color: #28a745;"><i class="fa-solid fa-location-dot"></i> DÉPART</button>
      <button onclick="fixerArrivee()" id="gps-stop" class="w-btn" style="flex: 1; border-color: #007bff; color: #007bff;" disabled><i class="fa-solid fa-flag"></i> ARRIVÉE</button>
    </div>
    <div id="gps-result" style="text-align: center; font-size: 0.7rem; margin: 8px 0; color: var(--accent); font-weight: 800;">PRÊT</div>
    <button onclick="resetGPS()" class="w-btn" style="width:100%; font-size:0.6rem; opacity:0.6; border-color:rgba(255,255,255,0.2);"><i class="fa-solid fa-arrows-rotate"></i> RESET GPS</button>
  </div>
</div>

<div id="page-practice" class="page">
  <div class="card">
    <input type="date" id="p-date" class="p-input">
    <input type="number" id="p-seaux" class="p-input" placeholder="Nombre de seaux">
    <textarea id="p-notes" class="p-input" style="height:100px;" placeholder="Notes..."></textarea>
    <button class="save-btn" onclick="submitPractice()">ENREGISTRER</button>
  </div>
  
  <div class="card" style="padding:0; margin-top:20px; overflow:hidden;">
    <div style="background:rgba(255,255,255,0.05); padding:12px; border-bottom:1px solid var(--border); font-weight:800; font-size:0.7rem; color:var(--accent);">HISTORIQUE SÉANCES</div>
    <table style="width:100%; border-collapse:collapse; table-layout: fixed;">
      <thead>
        <tr style="font-size:0.6rem; color:var(--accent);">
          <th style="padding:8px; width:25%; text-align:center;">DATE</th>
          <th style="padding:8px; width:25%; text-align:center;">SEAUX</th>
          <th style="padding:8px; width:50%; text-align:left;">NOTES</th>
        </tr>
      </thead>
      <tbody id="practice-history-list"></tbody>
    </table>
  </div>
</div>

<div id="page-config" class="page">
  <div class="card">
    <select id="config-golf-select" onchange="displayConfig()"><option value="">-- Choisir un parcours --</option></select>
    <select id="config-format-select" onchange="displayConfig()" style="display:none;">
      <option value="18">18 TROUS</option>
      <option value="9">9 TROUS</option>
    </select>
  </div>
  <div id="config-table-container" class="card" style="display:none; padding: 5px;">
    <table><thead><tr><th>Trou</th><th>Par</th><th>Hcp</th></tr></thead><tbody id="config-body"></tbody></table>
  </div>
</div>

<div id="page-score" class="page">
  <div class="card">
    <input type="date" id="s-date" class="p-input">
    <input type="text" id="s-golf-display" class="p-input" readonly style="color:var(--accent); font-weight:bold;">
    <label>Index actuel</label>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <input type="number" id="index-joueur" class="p-input" step="0.1" style="margin-bottom:0;">
      <button onclick="validIndexSeul()" style="background:rgba(255,255,255,0.1); color:var(--accent); border:1px solid var(--accent); border-radius:8px; padding:0 15px; font-size:0.6rem; font-weight:900;">VALIDER</button>
    </div>
    <div style="display:flex; gap:10px;">
      <div style="flex:1;"><label>Trou</label><input type="number" id="s-trou" class="p-input" value="1"></div>
      <div style="flex:1;"><label>Score</label><input type="number" id="s-val-coups" class="p-input" placeholder="Coups"></div>
    </div>
    <button id="btn-save-score" class="save-btn" onclick="submitScore()">VALIDER LE SCORE</button>
    <button class="w-btn" style="width:100%; margin-top:10px; background:transparent; border:1px solid var(--danger); color:var(--danger);" onclick="resetScore()">↺ RÉINITIALISER LE PARCOURS</button>
  </div>
</div>

<div id="page-stats" class="page">
  <div class="card">
    <button class="w-btn" style="width:100%; border:1px solid var(--accent); margin-bottom:10px;" onclick="loadStats()">🔄 SYNCHRONISER</button>
    <table><thead><tr><th>DATE</th><th>PARCOURS</th><th>STB</th><th>TROUS</th></tr></thead><tbody id="stats-list"></tbody></table>
  </div>
</div>

<div id="page-glossary" class="page">
  <select id="glossary-select" onchange="displayDefinition()"></select>
  <div id="definition-container" class="card" style="text-align:center; min-height:150px; display:flex; align-items:center; justify-content:center;">Choisissez un terme...</div>
</div>

<div id="page-reglages" class="page">
  <div class="card">
    <label>Étalonnage sac</label>
    <input type="text" id="new-club-name" class="p-input" placeholder="Nom du club">
    <input type="text" id="new-club-legend" class="p-input" placeholder="Légende">
    <input type="number" id="new-club-dist" class="p-input" placeholder="Distance étalon (m)">
    <button class="save-btn" id="add-btn" onclick="addNewClub()">ENREGISTRER</button>
  </div>
  <div class="card">
    <table><thead><tr><th>CLUB</th><th>LÉGENDE</th><th>DIST.</th><th></th></tr></thead><tbody id="my-clubs-list"></tbody></table>
  </div>
</div>

<script>
  let clubs = [], glossaryData = [], configData = [], wDir = 'face', currentFormat = 18;

  function showStatus(msg) {
    const toast = document.getElementById('status-toast');
    toast.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${msg}`;
    toast.style.display = 'block';
  }

  function hideStatus(msg, isError = false) {
    const toast = document.getElementById('status-toast');
    toast.innerHTML = `<i class="fa-solid ${isError ? 'fa-xmark' : 'fa-check'}"></i> ${msg}`;
    toast.style.borderColor = isError ? 'var(--danger)' : 'var(--accent)';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }

  function initApp() {
    const email = localStorage.getItem('proEdgeUserEmail');
    if(!email) return;
    document.getElementById('user-display').innerText = "ID: " + email.split('@')[0].toUpperCase();
    google.script.run.withSuccessHandler(function(data) {
      if(!data || data.error) return;
      clubs = data.clubs; 
      if (data.userIndex) document.getElementById('index-joueur').value = data.userIndex;
      let sClub = document.getElementById('club-list');
      sClub.innerHTML = '<option value="AUTO">-- ANALYSE STRATÉGIQUE --</option>';
      let sortedClubs = [...clubs].sort((a,b) => b[1] - a[1]);
      sortedClubs.forEach((c) => {
          sClub.add(new Option(c[0].toUpperCase() + " (" + c[1] + "m)", clubs.indexOf(c)));
      });
      updateSacUI();
      glossaryData = data.glossary || [];
      let sGloss = document.getElementById('glossary-select');
      sGloss.innerHTML = '<option value="">-- LEXIQUE TECHNIQUE --</option>';
      glossaryData.forEach((item, index) => sGloss.add(new Option(item[0].toUpperCase(), index)));
      configData = data.configData || [];
      let sGolf = document.getElementById('config-golf-select');
      sGolf.innerHTML = '<option value="">-- PARCOURS DISPONIBLES --</option>';
      if(data.golfsList) data.golfsList.forEach(g => sGolf.add(new Option(g, g)));
      document.getElementById('p-date').valueAsDate = new Date();
      document.getElementById('s-date').valueAsDate = new Date();
      update();
    }).getAppData(email);
    updateWeather();
  }

  function validIndexSeul() {
    const val = document.getElementById('index-joueur').value;
    const email = localStorage.getItem('proEdgeUserEmail');
    showStatus("SYNCHRO INDEX...");
    google.script.run.withSuccessHandler(res => {
      if(res === "OK") hideStatus("INDEX SAUVEGARDÉ");
      else hideStatus("ERREUR", true);
    }).saveOnlyIndex(val, email);
  }

  function updateSacUI() {
    let regList = document.getElementById('my-clubs-list');
    regList.innerHTML = "";
    [...clubs].reverse().forEach(c => {
      let row = regList.insertRow();
      row.insertCell(0).innerText = c[0].toUpperCase(); 
      row.insertCell(1).innerHTML = `<i style="font-size:0.65rem; color:var(--accent);">${c[2] || "-"}</i>`; 
      row.insertCell(2).innerText = c[1] + "m"; 
      let delCell = row.insertCell(3);
      let btn = document.createElement('button');
      btn.style.cssText = "color:var(--danger); border:none; background:none; padding:5px;";
      btn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
      btn.onclick = function() { deleteClub(c[0]); };
      delCell.appendChild(btn);
    });
  }

  function deleteClub(name) { 
    const email = localStorage.getItem('proEdgeUserEmail');
    showStatus("SUPPRESSION...");
    google.script.run.withSuccessHandler(() => {
      hideStatus("CLUB SUPPRIMÉ");
      initApp();
    }).deleteClub(name, email); 
  }

  function update() {
    const targetVal = document.getElementById('target').value;
    const clubValue = document.getElementById('club-list').value;
    let windAdj = (wDir === 'face') ? -11 : (wDir === 'dos') ? 8 : -2;
    let selected;
    if (clubValue === "AUTO") {
      const target = parseFloat(targetVal) || 0;
      if (target <= 0) {
          document.getElementById('res-club-name').innerText = "--";
          document.getElementById('res-val').innerText = "--";
          return;
      }
      selected = clubs.filter(c => !c[0].toLowerCase().includes("putter") && c[1] > 0).sort((a, b) => a[1] - b[1]).find(c => (c[1] + windAdj) >= target);
      if (!selected && clubs.length > 0) selected = clubs.filter(c => !c[0].toLowerCase().includes("putter") && c[1] > 0).sort((a, b) => a[1] - b[1]).pop();
    } else { selected = clubs[parseInt(clubValue)]; }
    if (selected) {
      document.getElementById('res-club-name').innerText = selected[0].toUpperCase();
      document.getElementById('res-val').innerText = Math.round(selected[1] + windAdj) + "M";
    }
  }

  function toggleSunMode() { document.body.classList.toggle('sun-mode'); }

  function showPage(p) { 
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); 
    document.getElementById('page-' + p).classList.add('active'); 
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + p).classList.add('active');
    if(p === 'practice') loadPracticeHistory();
    if(p === 'stats') loadStats();
  }

  function setW(d) { wDir = d; document.querySelectorAll('.w-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + d).classList.add('active'); update(); }
  
  function resetCaddy() { 
    document.getElementById('target').value = ""; 
    document.getElementById('club-list').value = "AUTO"; 
    document.getElementById('res-club-name').innerText = "--";
    document.getElementById('res-val').innerText = "--";
    showStatus("CADDY RÉINITIALISÉ");
    setTimeout(() => hideStatus("PRÊT"), 1000);
  }
  
  function resetScore() { 
    if(confirm("Effacer le parcours en cours ?")) { 
      document.getElementById('s-trou').value = 1; 
      document.getElementById('s-val-coups').value = ""; 
      const btn = document.getElementById('btn-save-score');
      btn.disabled = false;
      btn.innerHTML = "VALIDER LE SCORE";
      btn.style.background = "var(--accent)";
    } 
  }

  function addNewClub() {
    const email = localStorage.getItem('proEdgeUserEmail');
    showStatus("ENREGISTREMENT...");
    google.script.run.withSuccessHandler(() => {
      hideStatus("CLUB AJOUTÉ");
      initApp();
    }).addClub(document.getElementById('new-club-name').value, document.getElementById('new-club-dist').value, email, document.getElementById('new-club-legend').value);
  }

  function displayConfig() {
    const golf = document.getElementById('config-golf-select').value;
    const tbody = document.getElementById('config-body');
    tbody.innerHTML = ""; 
    const filtered = configData.filter(r => r[0] === golf);
    if (filtered.length > 0) {
      filtered.forEach(f => {
        let row = tbody.insertRow();
        row.insertCell(0).innerText = f[2]; row.insertCell(1).innerText = f[3]; row.insertCell(2).innerText = f[4]; 
      });
      currentFormat = filtered.length;
      document.getElementById('config-table-container').style.display = "block";
      document.getElementById('s-golf-display').value = golf;
    }
  }

  function submitScore() {
    const tInput = document.getElementById('s-trou');
    const currentTrou = parseInt(tInput.value);
    const email = localStorage.getItem('proEdgeUserEmail');
    const btn = document.getElementById('btn-save-score');
    if (currentTrou > currentFormat) return;
    showStatus("ENVOI SCORE...");
    google.script.run.withSuccessHandler((res) => { 
      // MODIFICATION CHIRURGICALE : Affiche la réponse dynamique au lieu du texte figé
      hideStatus(res); 
      
      if (currentTrou >= currentFormat) {
          btn.innerHTML = "ANALYSE INDEX...";
          btn.disabled = true;
          setTimeout(() => {
            analyserIndex();
            btn.innerHTML = "PARCOURS TERMINÉ";
          }, 3500);
      } else {
        tInput.value = currentTrou + 1; 
        document.getElementById('s-val-coups').value = ""; 
      }
    }).saveScoreData(document.getElementById('s-date').value, document.getElementById('s-golf-display').value, currentTrou, document.getElementById('s-val-coups').value, document.getElementById('index-joueur').value, email);
  }

  function analyserIndex() {
    const email = localStorage.getItem('proEdgeUserEmail');
    google.script.run.withSuccessHandler(function(stats) {
      if (!stats || stats.length === 0) return;
      const last = stats[0];
      const stb = parseInt(last.stb);
      const nbTrous = parseInt(last.trous);
      const idx = parseFloat(document.getElementById('index-joueur').value);
      const target = (nbTrous <= 9) ? 18 : 36;
      if (stb > target) {
        const diff = stb - target;
        const nIdx = Math.max(0, (idx - diff)).toFixed(1);
        if(confirm("PERFORMANCE (" + nbTrous + " TROUS) !\nScore Stableford: " + stb + "\nNouvel index calculé: " + nIdx + "\nMettre à jour votre profil ?")) {
          document.getElementById('index-joueur').value = nIdx;
          validIndexSeul();
        }
      }
    }).getStatsData(email);
  }

  function updateWeather() { google.script.run.withSuccessHandler(w => { if(w) document.getElementById('meteo-data').innerText = w.temp + "°C | 💨 " + w.wind + " KM/H"; }).getWeather(); }

  function loadStats() {
    const email = localStorage.getItem('proEdgeUserEmail');
    google.script.run.withSuccessHandler(function(stats) {
        hideStatus("STATS À JOUR");
        const list = document.getElementById('stats-list');
        list.innerHTML = ""; 
        if (!stats) return;
        stats.forEach(s => {
          let row = list.insertRow();
          row.insertCell(0).innerText = s.date; row.insertCell(1).innerText = s.golf;
          row.insertCell(2).innerText = s.stb + " pts"; row.insertCell(3).innerText = s.trous + " trs";
        });
      }).getStatsData(email);
  }

  function displayDefinition() {
    const idx = document.getElementById('glossary-select').value;
    const cont = document.getElementById('definition-container');
    if(idx === "") return;
    cont.innerHTML = `<div style="text-align:left;"><strong>${glossaryData[idx][0]}</strong><br><br>${glossaryData[idx][1]}</div>`;
  }

  function submitPractice() {
    const email = localStorage.getItem('proEdgeUserEmail');
    google.script.run.withSuccessHandler(() => {
      hideStatus("SÉANCE ENREGISTRÉE");
      document.getElementById('p-seaux').value = ""; 
      document.getElementById('p-notes').value = "";
      loadPracticeHistory();
    }).savePracticeData(document.getElementById('p-date').value, document.getElementById('p-seaux').value, document.getElementById('p-notes').value, email);
  }

  function loadPracticeHistory() {
    const email = localStorage.getItem('proEdgeUserEmail');
    google.script.run.withSuccessHandler(data => {
      const list = document.getElementById('practice-history-list');
      list.innerHTML = "";
      if(!data) return;
      data.forEach(s => {
        let row = list.insertRow();
        row.insertCell(0).innerText = s.date; row.insertCell(1).innerText = s.seaux;
        let n = row.insertCell(2); n.innerText = s.notes; n.style.textAlign = "left";
      });
    }).getPracticeStats(email);
  }

  function fixerDepart() { 
    showStatus("POSITIONNEMENT GPS...");
    navigator.geolocation.getCurrentPosition(p => { 
      cDep = {lat: p.coords.latitude, lng: p.coords.longitude}; 
      document.getElementById('gps-start').disabled = true; 
      document.getElementById('gps-stop').disabled = false; 
      document.getElementById('gps-result').innerText = "POINT DÉPART FIXÉ"; 
      hideStatus("DÉPART ENREGISTRÉ");
    }, (err) => { hideStatus("ERREUR GPS", true); }, {enableHighAccuracy: true}); 
  }
  function fixerArrivee() { 
    showStatus("CALCUL DISTANCE...");
    navigator.geolocation.getCurrentPosition(p => {
      const R = 6371000;
      const dLat = (p.coords.latitude - cDep.lat) * Math.PI/180;
      const dLon = (p.coords.longitude - cDep.lng) * Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(cDep.lat*Math.PI/180) * Math.cos(p.coords.latitude*Math.PI/180) * Math.sin(dLon/2)**2;
      const dist = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
      document.getElementById('gps-result').innerHTML = `DISTANCE : <span style="font-size:1.2rem; color:var(--accent);">${dist}M</span>`;
      document.getElementById('gps-stop').disabled = true;
      hideStatus("MESURE TERMINÉE");
    }, (err) => { hideStatus("ERREUR GPS", true); }, {enableHighAccuracy: true});
  }
  function resetGPS() { 
    cDep = null; 
    document.getElementById('gps-start').disabled = false; 
    document.getElementById('gps-stop').disabled = true; 
    document.getElementById('gps-result').innerText = "PRÊT"; 
    showStatus("GPS RÉINITIALISÉ");
    setTimeout(() => hideStatus("PRÊT"), 1000);
  }
  window.onload = () => { if(localStorage.getItem('proEdgeUserEmail')) initApp(); };
</script>
</body>
